<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Colorful Tic Tac Toe</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#ff6a00,#ee0979,#00c6ff,#0072ff);
    background-size:400% 400%;
    animation: gradientMove 10s infinite alternate;
    color:white;
}

@keyframes gradientMove{
    0%{background-position:left;}
    100%{background-position:right;}
}

h1{
    margin-bottom:10px;
    text-shadow:0 0 10px rgba(255,255,255,0.7);
}

.controls{
    margin:15px;
}

button{
    padding:10px 18px;
    margin:5px;
    border:none;
    border-radius:25px;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
    color:white;
    background:linear-gradient(45deg,#00dbde,#fc00ff);
    box-shadow:0 0 10px rgba(0,0,0,0.4);
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

.status{
    margin:10px;
    font-size:20px;
    font-weight:bold;
}

.board{
    display:grid;
    grid-template-columns:repeat(3,110px);
    gap:12px;
    padding:20px;
    border-radius:20px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.cell{
    width:110px;
    height:110px;
    border-radius:15px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:50px;
    font-weight:bold;
    cursor:pointer;
    background:rgba(255,255,255,0.2);
    transition:0.3s;
}

.cell:hover{
    transform:scale(1.08);
    background:rgba(255,255,255,0.35);
}

.X{
    color:#00ffd5;
    text-shadow:0 0 15px #00ffd5;
}

.O{
    color:#ffea00;
    text-shadow:0 0 15px #ffea00;
}

.win{
    background:#00ff95 !important;
    color:black !important;
}
</style>
</head>

<body>

<h1>✨ Tic Tac Toe ✨</h1>

<div class="controls">
    <button onclick="setMode('pvp')">Player vs Player</button>
    <button onclick="setMode('ai')">Play vs AI</button>
    <button onclick="resetGame()">Restart</button>
</div>

<div class="status" id="status">Player X's Turn</div>
<div class="board" id="board"></div>

<script>
const board = document.getElementById("board");
const statusText = document.getElementById("status");

let cells = [];
let gameState = ["","","","","","","","",""];
let currentPlayer = "X";
let gameActive = true;
let mode = "pvp";

const winPatterns = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
];

function createBoard(){
    board.innerHTML="";
    cells=[];

    for(let i=0;i<9;i++){
        const cell=document.createElement("div");
        cell.classList.add("cell");
        cell.addEventListener("click",()=>handleMove(i));
        board.appendChild(cell);
        cells.push(cell);
    }
}

function handleMove(index){
    if(gameState[index]!=="" || !gameActive) return;

    makeMove(index,currentPlayer);

    if(checkWinner()) return;

    currentPlayer=currentPlayer==="X"?"O":"X";
    statusText.textContent="Player "+currentPlayer+"'s Turn";

    if(mode==="ai" && currentPlayer==="O"){
        setTimeout(aiMove,400);
    }
}

function makeMove(index,player){
    gameState[index]=player;
    cells[index].textContent=player;
    cells[index].classList.add(player);
}

function aiMove(){
    let empty=gameState.map((v,i)=>v===""?i:null).filter(v=>v!==null);
    if(empty.length===0) return;

    let move=empty[Math.floor(Math.random()*empty.length)];
    makeMove(move,"O");

    if(checkWinner()) return;

    currentPlayer="X";
    statusText.textContent="Player X's Turn";
}

function checkWinner(){
    for(let pattern of winPatterns){
        const [a,b,c]=pattern;
        if(gameState[a] && gameState[a]===gameState[b] && gameState[a]===gameState[c]){
            cells[a].classList.add("win");
            cells[b].classList.add("win");
            cells[c].classList.add("win");
            statusText.textContent="🎉 Player "+gameState[a]+" Wins!";
            gameActive=false;
            return true;
        }
    }

    if(!gameState.includes("")){
        statusText.textContent="😲 It's a Draw!";
        gameActive=false;
        return true;
    }
    return false;
}

function resetGame(){
    gameState=["","","","","","","","",""];
    currentPlayer="X";
    gameActive=true;
    statusText.textContent="Player X's Turn";
    createBoard();
}

function setMode(m){
    mode=m;
    resetGame();
}

createBoard();
</script>

</body>
</html>
